<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 220" width="100%" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="8" />
  
  <!-- Panel 1: Perceived Brightness (Average) -->
  <text x="75" y="22" fill="#8b949e" font-family="sans-serif" font-weight="bold" font-size="11">Rata-Rata Kecerahan LED (Persepsi Mata)</text>
  <line x1="75" y1="30" x2="475" y2="30" stroke="#30363d" stroke-dasharray="3" />
  <line x1="75" y1="90" x2="475" y2="90" stroke="#30363d" stroke-dasharray="3" />
  <line x1="75" y1="95" x2="475" y2="95" stroke="#8b949e" stroke-width="1.5" />
  <line x1="75" y1="25" x2="75" y2="98" stroke="#8b949e" stroke-width="1.5" />
  
  <text x="65" y="34" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="end">Max (255)</text>
  <text x="65" y="94" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="end">Min (0)</text>
  
  <!-- Smooth Curve -->
  <path d="M 75,30 L 175,30 L 175,90 L 275,90 L 275,30 L 375,30 L 375,90 L 475,90" fill="none" stroke="#ff5e00" stroke-width="3" stroke-linecap="round" filter="url(#glow)" />

  <!-- Panel 2: Physical PWM Pulse Train -->
  <text x="75" y="112" fill="#8b949e" font-family="sans-serif" font-weight="bold" font-size="11">Sinyal PWM Fisik (Duty Cycle)</text>
  <line x1="75" y1="120" x2="475" y2="120" stroke="#30363d" stroke-dasharray="3" />
  <line x1="75" y1="170" x2="475" y2="170" stroke="#30363d" stroke-dasharray="3" />
  <line x1="75" y1="175" x2="475" y2="175" stroke="#8b949e" stroke-width="1.5" />
  <line x1="75" y1="115" x2="75" y2="178" stroke="#8b949e" stroke-width="1.5" />
  
  <text x="65" y="124" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="end">HIGH (3.3V)</text>
  <text x="65" y="174" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="end">LOW (0V)</text>
  
  <!-- PWM Pulse Train -->
  <path d="M 75,170 L 75.0,120 L 84.0,120 L 84.0,170 L 85.0,170 L 85.0,120 L 94.0,120 L 94.0,170 L 95.0,170 L 95.0,120 L 104.0,120 L 104.0,170 L 105.0,170 L 105.0,120 L 114.0,120 L 114.0,170 L 115.0,170 L 115.0,120 L 124.0,120 L 124.0,170 L 125.0,170 L 125.0,120 L 134.0,120 L 134.0,170 L 135.0,170 L 135.0,120 L 144.0,120 L 144.0,170 L 145.0,170 L 145.0,120 L 154.0,120 L 154.0,170 L 155.0,170 L 155.0,120 L 164.0,120 L 164.0,170 L 165.0,170 L 165.0,120 L 174.0,120 L 174.0,170 L 175.0,170 L 175.0,120 L 175.5,120 L 175.5,170 L 185.0,170 L 185.0,120 L 185.5,120 L 185.5,170 L 195.0,170 L 195.0,120 L 195.5,120 L 195.5,170 L 205.0,170 L 205.0,120 L 205.5,120 L 205.5,170 L 215.0,170 L 215.0,120 L 215.5,120 L 215.5,170 L 225.0,170 L 225.0,120 L 225.5,120 L 225.5,170 L 235.0,170 L 235.0,120 L 235.5,120 L 235.5,170 L 245.0,170 L 245.0,120 L 245.5,120 L 245.5,170 L 255.0,170 L 255.0,120 L 255.5,120 L 255.5,170 L 265.0,170 L 265.0,120 L 265.5,120 L 265.5,170 L 275.0,170 L 275.0,120 L 284.0,120 L 284.0,170 L 285.0,170 L 285.0,120 L 294.0,120 L 294.0,170 L 295.0,170 L 295.0,120 L 304.0,120 L 304.0,170 L 305.0,170 L 305.0,120 L 314.0,120 L 314.0,170 L 315.0,170 L 315.0,120 L 324.0,120 L 324.0,170 L 325.0,170 L 325.0,120 L 334.0,120 L 334.0,170 L 335.0,170 L 335.0,120 L 344.0,120 L 344.0,170 L 345.0,170 L 345.0,120 L 354.0,120 L 354.0,170 L 355.0,170 L 355.0,120 L 364.0,120 L 364.0,170 L 365.0,170 L 365.0,120 L 374.0,120 L 374.0,170 L 375.0,170 L 375.0,120 L 375.5,120 L 375.5,170 L 385.0,170 L 385.0,120 L 385.5,120 L 385.5,170 L 395.0,170 L 395.0,120 L 395.5,120 L 395.5,170 L 405.0,170 L 405.0,120 L 405.5,120 L 405.5,170 L 415.0,170 L 415.0,120 L 415.5,120 L 415.5,170 L 425.0,170 L 425.0,120 L 425.5,120 L 425.5,170 L 435.0,170 L 435.0,120 L 435.5,120 L 435.5,170 L 445.0,170 L 445.0,120 L 445.5,120 L 445.5,170 L 455.0,170 L 455.0,120 L 455.5,120 L 455.5,170 L 465.0,170 L 465.0,120 L 465.5,120 L 465.5,170 L 475.0,170" fill="none" stroke="#ff5e00" stroke-width="1.5" opacity="0.85" />
  
  <!-- X Axis Timeline Labels -->
  <text x="75" y="195" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="middle">0%</text>
  <text x="275" y="195" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="middle">Waktu Siklus (50%)</text>
  <text x="475" y="195" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="middle">100%</text>
</svg>
