<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 220" width="100%" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="8" />
  
  <!-- Panel 1: Perceived Brightness (Average) -->
  <text x="75" y="22" fill="#8b949e" font-family="sans-serif" font-weight="bold" font-size="11">Rata-Rata Kecerahan LED (Persepsi Mata)</text>
  <line x1="75" y1="30" x2="475" y2="30" stroke="#30363d" stroke-dasharray="3" />
  <line x1="75" y1="90" x2="475" y2="90" stroke="#30363d" stroke-dasharray="3" />
  <line x1="75" y1="95" x2="475" y2="95" stroke="#8b949e" stroke-width="1.5" />
  <line x1="75" y1="25" x2="75" y2="98" stroke="#8b949e" stroke-width="1.5" />
  
  <text x="65" y="34" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="end">Max (255)</text>
  <text x="65" y="94" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="end">Min (0)</text>
  
  <!-- Smooth Curve -->
  <line x1="75" y1="60" x2="475" y2="60" fill="none" stroke="#00ff66" stroke-width="3" filter="url(#glow)" />

  <!-- Panel 2: Physical PWM Pulse Train -->
  <text x="75" y="112" fill="#8b949e" font-family="sans-serif" font-weight="bold" font-size="11">Sinyal PWM Fisik (Duty Cycle)</text>
  <line x1="75" y1="120" x2="475" y2="120" stroke="#30363d" stroke-dasharray="3" />
  <line x1="75" y1="170" x2="475" y2="170" stroke="#30363d" stroke-dasharray="3" />
  <line x1="75" y1="175" x2="475" y2="175" stroke="#8b949e" stroke-width="1.5" />
  <line x1="75" y1="115" x2="75" y2="178" stroke="#8b949e" stroke-width="1.5" />
  
  <text x="65" y="124" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="end">HIGH (3.3V)</text>
  <text x="65" y="174" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="end">LOW (0V)</text>
  
  <!-- PWM Pulse Train -->
  <path d="M 75,170 L 75.0,120 L 80.0,120 L 80.0,170 L 85.0,170 L 85.0,120 L 90.0,120 L 90.0,170 L 95.0,170 L 95.0,120 L 100.0,120 L 100.0,170 L 105.0,170 L 105.0,120 L 110.0,120 L 110.0,170 L 115.0,170 L 115.0,120 L 120.0,120 L 120.0,170 L 125.0,170 L 125.0,120 L 130.0,120 L 130.0,170 L 135.0,170 L 135.0,120 L 140.0,120 L 140.0,170 L 145.0,170 L 145.0,120 L 150.0,120 L 150.0,170 L 155.0,170 L 155.0,120 L 160.0,120 L 160.0,170 L 165.0,170 L 165.0,120 L 170.0,120 L 170.0,170 L 175.0,170 L 175.0,120 L 180.0,120 L 180.0,170 L 185.0,170 L 185.0,120 L 190.0,120 L 190.0,170 L 195.0,170 L 195.0,120 L 200.0,120 L 200.0,170 L 205.0,170 L 205.0,120 L 210.0,120 L 210.0,170 L 215.0,170 L 215.0,120 L 220.0,120 L 220.0,170 L 225.0,170 L 225.0,120 L 230.0,120 L 230.0,170 L 235.0,170 L 235.0,120 L 240.0,120 L 240.0,170 L 245.0,170 L 245.0,120 L 250.0,120 L 250.0,170 L 255.0,170 L 255.0,120 L 260.0,120 L 260.0,170 L 265.0,170 L 265.0,120 L 270.0,120 L 270.0,170 L 275.0,170 L 275.0,120 L 280.0,120 L 280.0,170 L 285.0,170 L 285.0,120 L 290.0,120 L 290.0,170 L 295.0,170 L 295.0,120 L 300.0,120 L 300.0,170 L 305.0,170 L 305.0,120 L 310.0,120 L 310.0,170 L 315.0,170 L 315.0,120 L 320.0,120 L 320.0,170 L 325.0,170 L 325.0,120 L 330.0,120 L 330.0,170 L 335.0,170 L 335.0,120 L 340.0,120 L 340.0,170 L 345.0,170 L 345.0,120 L 350.0,120 L 350.0,170 L 355.0,170 L 355.0,120 L 360.0,120 L 360.0,170 L 365.0,170 L 365.0,120 L 370.0,120 L 370.0,170 L 375.0,170 L 375.0,120 L 380.0,120 L 380.0,170 L 385.0,170 L 385.0,120 L 390.0,120 L 390.0,170 L 395.0,170 L 395.0,120 L 400.0,120 L 400.0,170 L 405.0,170 L 405.0,120 L 410.0,120 L 410.0,170 L 415.0,170 L 415.0,120 L 420.0,120 L 420.0,170 L 425.0,170 L 425.0,120 L 430.0,120 L 430.0,170 L 435.0,170 L 435.0,120 L 440.0,120 L 440.0,170 L 445.0,170 L 445.0,120 L 450.0,120 L 450.0,170 L 455.0,170 L 455.0,120 L 460.0,120 L 460.0,170 L 465.0,170 L 465.0,120 L 470.0,120 L 470.0,170 L 475.0,170" fill="none" stroke="#00ff66" stroke-width="1.5" opacity="0.85" />
  
  <!-- X Axis Timeline Labels -->
  <text x="75" y="195" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="middle">0%</text>
  <text x="275" y="195" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="middle">Waktu Siklus (50%)</text>
  <text x="475" y="195" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="middle">100%</text>
</svg>
